services:
  backend:
    ports:
      - 8000:8000
    command: ["fastapi", "run", "--workers", "4", "app/static_app.py"]
    volumes:
      - static-internal:/app/static-internal
      - static-public:/app/static-public

  frontend-public:
    profiles:
      - dev

  frontend-internal:
    profiles:
      - dev

  frontend-build:
    image: node:20
    restart: "no"
    profiles:
      - build
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
    command: sh -c "echo 'Building public/internal frontends (this must finish before backend starts)...' && export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.1 && pnpm install --frozen-lockfile && VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api} VITE_PUBLIC_WIDGET_BASE_PATH=/public/ pnpm run build-public-prod && VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api} pnpm run build-internal-prod && rm -rf /static-public/* /static-internal/* && cp -R dist-public-prod/* /static-public/ && cp -R dist-internal-prod/* /static-internal/ && touch /static-public/.built /static-internal/.built"
    volumes:
      - ./frontend:/app
      - static-public:/static-public
      - static-internal:/static-internal

volumes:
  static-public:
  static-internal:
