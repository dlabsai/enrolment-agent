services:
  db:
    image: pgvector/pgvector:pg17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata

  prestart:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
    command: bash scripts/prestart.sh
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}

  backend:
    image: ${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}
    restart: "no"
    env_file:
      - .env
    environment:
      - FRONTEND_HOST=${FRONTEND_HOST?Variable not set}
      - ENVIRONMENT=${ENVIRONMENT}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
    build:
      context: ./backend
    ports:
      - 8000:8000
    command:
      - fastapi
      - run
      - --reload
      - app/app.py
    depends_on:
      db:
        condition: service_healthy
        restart: true
      prestart:
        condition: service_completed_successfully
    volumes:
      - ./backend/app/chat/templates:/app/app/chat/templates
      - ./backend/app/chat/rag_data:/app/app/chat/rag_data
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild

  frontend-public:
    image: node:20
    restart: "no"
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
      - VITE_API_URL=http://backend:8000/api
    command: sh -c "export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.1 && pnpm install --frozen-lockfile && pnpm -w --filter @va/build-config build && pnpm run dev-public-local -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_started
    ports:
      - 5173:5173
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  frontend-internal:
    image: node:20
    restart: "no"
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/tmp
      - NPM_CONFIG_PREFIX=/tmp/.npm-global
      - CI=true
      - VITE_API_URL=http://backend:8000/api
    command: sh -c "export PATH=/tmp/.npm-global/bin:$${PATH} && npm install -g pnpm@10.28.1 && pnpm install --frozen-lockfile && pnpm -w --filter @va/build-config build && pnpm run dev-internal-local -- --host 0.0.0.0 --port 5174"
    depends_on:
      backend:
        condition: service_started
    ports:
      - 5174:5174
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  wp-db:
    image: mysql:8.0
    restart: "no"
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=wordpress
      - MYSQL_ROOT_PASSWORD=wordpress
    volumes:
      - wp-db-data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: "no"
    depends_on:
      - wp-db
    environment:
      - WORDPRESS_DB_HOST=wp-db:3306
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_WIDGET_SCRIPT_URL=${WORDPRESS_WIDGET_SCRIPT_URL:-http://localhost:8000/public/chat-widget.js}
    ports:
      - 8080:80
    volumes:
      - wp-data:/var/www/html
      - ./wordpress-demo/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wp-cli:
    image: wordpress:cli
    restart: "no"
    profiles:
      - wp-demo
    user: "0:0"
    depends_on:
      - wp-db
      - wordpress
    command: ["sleep", "infinity"]
    environment:
      - WORDPRESS_DB_HOST=wp-db:3306
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=wordpress
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wp-data:/var/www/html
      - ./wordpress-demo/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

volumes:
  postgres-data:
  templates:
  frontend-node-modules:
  wp-db-data:
  wp-data:
