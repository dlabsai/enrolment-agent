<svg xmlns="http://www.w3.org/2000/svg" viewBox="159 169 705 701" width="705" height="701" role="img" aria-labelledby="title desc">
  <title id="title">Enrollment agent headset inside a chat bubble</title>
  <desc id="desc">A blue and gold headset icon inside a rounded speech bubble on a transparent background.</desc>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#496882"/>
      <stop offset="52%" stop-color="#36536a"/>
      <stop offset="100%" stop-color="#2d465a"/>
    </linearGradient>
    <linearGradient id="blueFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44657e"/>
      <stop offset="100%" stop-color="#314c61"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f2b741"/>
      <stop offset="100%" stop-color="#d89d2c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#fcfcfb"/>
      <stop offset="100%" stop-color="#efefed"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f2230" flood-opacity="0.16"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path
      d="M268 191H755A87 87 0 0 1 842 278V668A97 97 0 0 1 745 765H438L329 848V765H268A87 87 0 0 1 181 678V278A87 87 0 0 1 268 191Z"
      fill="url(#panel)"
      stroke="url(#blue)"
      stroke-width="20"
      stroke-linejoin="round"
    />

    <path
      d="M736 551A178 178 0 0 1 558 709"
      fill="none"
      stroke="url(#gold)"
      stroke-width="30"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M267 429A245 195 0 0 1 757 429"
      fill="none"
      stroke="url(#blue)"
      stroke-width="20"
      stroke-linecap="round"
    />

    <rect x="244" y="420" width="84" height="150" rx="38" fill="url(#blue)"/>
    <path
      d="M288 433H310V553H288A22 22 0 0 1 266 531V455A22 22 0 0 1 288 433Z"
      fill="url(#gold)"
    />

    <rect x="696" y="420" width="84" height="150" rx="38" fill="url(#blue)"/>
    <path
      d="M714 433H736A22 22 0 0 1 758 455V531A22 22 0 0 1 736 553H714V433Z"
      fill="url(#gold)"
    />

    <rect x="292" y="355" width="440" height="268" rx="56" fill="url(#panel)" stroke="url(#blue)" stroke-width="20"/>
    <rect x="358" y="390" width="308" height="206" rx="18" fill="url(#blueFace)"/>

    <rect x="418" y="460" width="44" height="68" rx="22" fill="url(#panel)"/>
    <rect x="560" y="460" width="44" height="68" rx="22" fill="url(#panel)"/>

    <rect x="470" y="658" width="114" height="70" rx="35" fill="url(#blue)"/>
    <rect x="492" y="680" width="70" height="26" rx="13" fill="url(#gold)"/>
